<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북원노인종합복지관 후원업체 지도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
  
  #container {
    display: flex; flex-direction: column;
    width: 100%; height: 100vh;
  }
  
  #map-section {
    position: relative;
    width: 100%; height: 60%; min-height: 300px;
  }
  #map { width: 100%; height: 100%; }
  
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: #fff; padding: 10px 14px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 13px;
  }
  #panel strong { color: #d4a017; font-size: 14px; }
  
  #search {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    width: 220px; padding: 8px 12px; border: 1px solid #ddd;
    border-radius: 6px; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  
  .info-window {
    padding: 12px 14px; min-width: 220px; max-width: 280px;
    font-size: 13px; line-height: 1.6;
  }
  .info-window .name { font-weight: bold; font-size: 15px; color: #333; margin-bottom: 6px; }
  .info-window .category {
    display: inline-block; background: #fff4d6; color: #b8860b;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 8px;
  }
  .info-window .row { color: #555; margin-top: 4px; }
  .info-window .row b { color: #888; display: inline-block; width: 40px; }
  
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 100; background: rgba(255,255,255,0.95); padding: 20px 30px;
    border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    font-size: 14px;
  }
  
  /* 명단 영역 */
  #list-section {
    width: 100%; height: 55%; min-height: 200px;
    overflow-y: auto; background: #fafafa;
    border-top: 2px solid #e0e0e0;
  }
  #list-header {
    padding: 12px 16px; background: #fff;
    border-bottom: 1px solid #e0e0e0;
    font-weight: bold; font-size: 14px; color: #333;
    position: sticky; top: 0; z-index: 5;
  }
  #list-header .count-badge {
    display: inline-block; background: #d4a017; color: #fff;
    padding: 2px 10px; border-radius: 12px; font-size: 12px;
    margin-left: 8px;
  }
  
  .list-item {
    padding: 12px 16px; border-bottom: 1px solid #ececec;
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; gap: 12px;
  }
  .list-item:hover { background: #fff4d6; }
  .list-item.active { background: #ffe9a8; }
  
  .list-item .no {
    width: 28px; height: 28px; flex-shrink: 0;
    background: #d4a017; color: #fff;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
  }
  .list-item .info { flex: 1; min-width: 0; }
  .list-item .info .name {
    font-weight: bold; font-size: 14px; color: #222;
    margin-bottom: 2px;
  }
  .list-item .info .meta {
    font-size: 12px; color: #777;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-item .info .meta .cat {
    color: #b8860b; margin-right: 6px;
  }
  
  .empty-msg {
    padding: 30px; text-align: center; color: #999; font-size: 13px;
  }
  
  /* 모바일 반응형 */
  @media (max-width: 600px) {
    #search { width: 160px; font-size: 12px; }
    #panel { font-size: 12px; padding: 8px 10px; }
    .list-item .info .meta { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="container">
  <div id="map-section">
    <div id="map"></div>
    <div id="panel">
      <strong>♥ 북원노인종합복지관</strong><br>
      후원업체 <span id="count">0</span>곳
    </div>
    <input type="text" id="search" placeholder="🔍 업체명·업종 검색">
    <div id="loading">지도를 불러오는 중...</div>
  </div>
  
  <div id="list-section">
    <div id="list-header">
      후원업체 명단
      <span class="count-badge" id="list-count">0</span>
    </div>
    <div id="list-items"></div>
  </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3e728a6e83cb38eec3d7a2321a5f0847&autoload=false"></script>
<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQASJWT9cqjzjFi7L7Q1gnv6dxYqYq6Z14RBGgJ3W1oWmfEB8QGOq_wTfOGyqR4DfulEvnJUKPXoJsm/pub?output=csv';
const CENTER = { lat: 37.3422, lng: 127.9202 };

let map, allMarkers = [], allInfoWindows = [], allData = [], openInfoWindow = null;

kakao.maps.load(function() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(CENTER.lat, CENTER.lng),
    level: 5
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  loadData();
});

async function loadData() {
  try {
    const res = await fetch(SHEET_CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    
    const data = rows.slice(1).filter(r => r[1] && r[5] && r[6]);
    allData = data;
    
    renderMarkers(data);
    renderList(data);
    document.getElementById('count').textContent = data.length;
    document.getElementById('list-count').textContent = data.length;
    document.getElementById('loading').style.display = 'none';
    
    if (data.length === 0) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = '등록된 후원업체가 없습니다.';
    }
  } catch (e) {
    document.getElementById('loading').textContent = '데이터 로딩 실패: ' + e.message;
  }
}

function renderMarkers(data) {
  allMarkers.forEach(m => m.setMap(null));
  allMarkers = [];
  allInfoWindows = [];
  
  const bounds = new kakao.maps.LatLngBounds();
  
  data.forEach((row, idx) => {
    const [no, name, category, addr, tel, lat, lng, memo] = row;
    const pos = new kakao.maps.LatLng(parseFloat(lat), parseFloat(lng));
    
    const marker = new kakao.maps.Marker({ position: pos, map: map, title: name });
    bounds.extend(pos);
    
    const html = `
      <div class="info-window">
        <div class="name">${escapeHtml(name)}</div>
        ${category ? `<span class="category">${escapeHtml(category)}</span><br>` : ''}
        <div class="row"><b>주소</b> ${escapeHtml(addr || '-')}</div>
        <div class="row"><b>전화</b> ${tel ? `<a href="tel:${tel}">${escapeHtml(tel)}</a>` : '-'}</div>
        ${memo ? `<div class="row"><b>비고</b> ${escapeHtml(memo)}</div>` : ''}
      </div>
    `;
    
    const infoWindow = new kakao.maps.InfoWindow({ content: html, removable: true });
    
    kakao.maps.event.addListener(marker, 'click', () => {
      openMarkerInfo(idx);
    });
    
    allMarkers.push(marker);
    allInfoWindows.push(infoWindow);
  });
  
  if (data.length > 0) map.setBounds(bounds);
}

function renderList(data) {
  const container = document.getElementById('list-items');
  
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-msg">표시할 후원업체가 없습니다.</div>';
    return;
  }
  
  container.innerHTML = data.map((row, idx) => {
    const [no, name, category, addr, tel] = row;
    return `
      <div class="list-item" data-idx="${idx}">
        <div class="no">${escapeHtml(no || (idx + 1))}</div>
        <div class="info">
          <div class="name">${escapeHtml(name)}</div>
          <div class="meta">
            ${category ? `<span class="cat">${escapeHtml(category)}</span>` : ''}
            ${escapeHtml(addr || '')}
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  container.querySelectorAll('.list-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      openMarkerInfo(idx);
      
      container.querySelectorAll('.list-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    });
  });
}

function openMarkerInfo(idx) {
  if (openInfoWindow) openInfoWindow.close();
  
  const marker = allMarkers[idx];
  const infoWindow = allInfoWindows[idx];
  if (!marker || !infoWindow) return;
  
  map.setLevel(3);
  map.panTo(marker.getPosition());
  
  setTimeout(() => {
    infoWindow.open(map, marker);
    openInfoWindow = infoWindow;
  }, 200);
  
  document.querySelectorAll('.list-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  let filtered;
  if (!q) {
    filtered = allData;
  } else {
    filtered = allData.filter(r => 
      (r[1] || '').toLowerCase().includes(q) || 
      (r[2] || '').toLowerCase().includes(q)
    );
  }
  renderMarkers(filtered);
  renderList(filtered);
  document.getElementById('count').textContent = filtered.length;
  document.getElementById('list-count').textContent = filtered.length;
});

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') inQuote = false;
      else cell += c;
    } else {
      if (c === '"') inQuote = true;
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c !== '\r') cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>

</body>
</html>
